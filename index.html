<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5fff0">
<title>HAPPINESS QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#f8fff8;font-family:'Noto Sans JP',sans-serif;color:#3a2a4a;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#90d8b0;border-radius:2px;}

@keyframes floatA   {0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-8px) rotate(1.5deg)}}
@keyframes glow     {0%,100%{box-shadow:0 0 10px #50c08044} 50%{box-shadow:0 0 24px #50c08099}}
@keyframes shimmer  {0%,100%{opacity:.4} 50%{opacity:1}}
@keyframes ticketGl {0%,100%{box-shadow:0 2px 8px #a855f733} 50%{box-shadow:0 4px 20px #a855f799}}
@keyframes floatXP  {0%{opacity:1;transform:translate(-50%,0)} 100%{opacity:0;transform:translate(-50%,-70px)}}
@keyframes sparkle  {0%{opacity:0;transform:scale(0) rotate(0deg)} 40%{opacity:1;transform:scale(1.4) rotate(200deg)} 100%{opacity:0;transform:scale(0) rotate(400deg)}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.08);opacity:1}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}}
@keyframes foodPop  {0%{opacity:0;transform:scale(0.3) translateY(20px)} 60%{opacity:1;transform:scale(1.25) translateY(-6px)} 100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes foodFly  {0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2)}}
@keyframes moodBounce{0%,100%{transform:scale(1)} 30%{transform:scale(1.3)} 60%{transform:scale(0.9)}}
@keyframes heartPop {0%{opacity:0;transform:scale(0) translateY(0)} 50%{opacity:1;transform:scale(1.4) translateY(-16px)} 100%{opacity:0;transform:scale(1) translateY(-32px)}}
@keyframes fullPulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.03)}}
@keyframes popIn    {0%{opacity:0;transform:scale(.7)} 70%{transform:scale(1.07)} 100%{opacity:1;transform:scale(1)}}
@keyframes bgFloat  {0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(3deg)}}

#app{max-width:430px;margin:0 auto;min-height:100vh;
  background:linear-gradient(160deg,#f0fff0 0%,#eef4ff 50%,#fffff0 100%);
  padding-bottom:90px;position:relative;overflow:hidden;}

/* 背景の装飾バブル */
#app::before{content:'';position:fixed;top:-60px;right:-40px;width:200px;height:200px;
  border-radius:50%;background:radial-gradient(circle,#ffe09088,transparent);pointer-events:none;z-index:0;}
#app::after{content:'';position:fixed;bottom:100px;left:-50px;width:180px;height:180px;
  border-radius:50%;background:radial-gradient(circle,#d6eaff88,transparent);pointer-events:none;z-index:0;}

.tab-bar{display:flex;border-bottom:2px solid #c8ecd8;background:#ffffffee;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.tab-btn{flex:1;padding:11px 2px;background:transparent;border:none;
  color:#70a890;border-bottom:3px solid transparent;font-size:10px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:#e07020;border-bottom:3px solid #e07020;font-weight:700;}

.modal-bg{position:fixed;inset:0;z-index:5000;background:#00000055;
  display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.floating-xp{position:fixed;top:36%;left:50%;font-family:'Nunito',sans-serif;font-size:28px;
  font-weight:900;pointer-events:none;z-index:9999;color:#ff8020;
  text-shadow:0 0 20px #ffa040,0 2px 8px #ffffff;
  animation:floatXP 1.5s ease-out forwards;white-space:nowrap;}

.qbtn{transition:all .16s;cursor:pointer;user-select:none;}
.qbtn:hover{transform:translateY(-1px);}
.qbtn:active{transform:scale(.96);opacity:.8;}
.fbtn{transition:all .18s;cursor:pointer;user-select:none;}
.fbtn:hover{transform:translateY(-3px) scale(1.04);}
.fbtn:active{transform:scale(.88);}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 20px #b0d8c022;border:1.5px solid #d8f0e0;}
.card-green{background:#fff;border-radius:20px;box-shadow:0 4px 20px #b0d8c022;border:1.5px solid #d8f0e0;}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════
//  定数
// ══════════════════════════
const RANKS=[
  {level:1, title:"迷える旅人",       icon:"🌱",minXP:0},
  {level:2, title:"希望の芽生え",     icon:"🌿",minXP:100},
  {level:3, title:"朝露の探求者",     icon:"🌸",minXP:250},
  {level:4, title:"光を集める者",     icon:"☀️",minXP:450},
  {level:5, title:"心の庭師",         icon:"🌻",minXP:700},
  {level:6, title:"穏やかな戦士",     icon:"⚔️",minXP:1000},
  {level:7, title:"幸せの錬金術師",   icon:"⚗️",minXP:1400},
  {level:8, title:"内なる光の守護者", icon:"🔮",minXP:1900},
  {level:9, title:"叡智の賢者",       icon:"🧙",minXP:2500},
  {level:10,title:"至福の覚醒者",     icon:"✨",minXP:3200},
  {level:11,title:"夢を紡ぐ者",       icon:"🌙",minXP:4000},
  {level:12,title:"奇跡の種まき師",   icon:"🌟",minXP:4900},
  {level:13,title:"調和の体現者",     icon:"☯️",minXP:5900},
  {level:14,title:"慈愛の巡礼者",     icon:"🕊️",minXP:7000},
  {level:15,title:"黄金の探求者",     icon:"👑",minXP:8200},
  {level:16,title:"天空の歩み人",     icon:"🦋",minXP:9500},
  {level:17,title:"永遠の灯台守",     icon:"🏮",minXP:10900},
  {level:18,title:"宇宙の調律師",     icon:"🎵",minXP:12400},
  {level:19,title:"無限の愛の体現",   icon:"💎",minXP:14000},
  {level:20,title:"幸福の神話の人",   icon:"🌈",minXP:15700},
  {level:21,title:"超越した旅人",     icon:"⭐",minXP:17500},
  {level:22,title:"星々の語り部",     icon:"🌠",minXP:19400},
  {level:23,title:"時空の賢者",       icon:"⏳",minXP:21400},
  {level:24,title:"神聖なる守護者",   icon:"🛡️",minXP:23500},
  {level:25,title:"至高の幸せ人",     icon:"🎇",minXP:25700},
];

const BASE_QUESTS=[
  {id:"meditation",label:"瞑想する",          desc:"1分間の静寂",        icon:"🧘",baseXP:30,food:"matcha"},
  {id:"protein",   label:"プロテイン飲む",     desc:"タンパク質チャージ",  icon:"💪",baseXP:20,food:"milk"},
  {id:"soy_egg",   label:"大豆 or 卵を食べる", desc:"良質なタンパク源",    icon:"🥚",baseXP:20,food:"egg"},
  {id:"sleep",     label:"12時までに寝る",     desc:"早寝は最高の魔法",    icon:"🌙",baseXP:50,food:"banana"},
  {id:"walking",   label:"ウォーキング",       desc:"10分 = 1回分のXP",   icon:"🚶",baseXP:25,food:"apple",repeatable:true,unit:"10分"},
  {id:"sunlight",  label:"日光を浴びる",       desc:"10分 = 1回分のXP",   icon:"🌞",baseXP:25,food:"corn",repeatable:true,unit:"10分"},
  {id:"diary",     label:"幸せ日記を書く",     desc:"今日の幸せを1つ記録", icon:"📖",baseXP:40,food:"strawberry",hasDiary:true},
];

const FOODS={
  matcha:     {emoji:"🍵",label:"抹茶",        moodUp:2,desc:"心が落ち着くよ〜"},
  milk:       {emoji:"🥛",label:"ミルク",      moodUp:1,desc:"栄養満点だよ！"},
  egg:        {emoji:"🥚",label:"たまご",      moodUp:2,desc:"完全食だね✨"},
  banana:     {emoji:"🍌",label:"バナナ",      moodUp:2,desc:"元気出た〜！"},
  apple:      {emoji:"🍎",label:"りんご",      moodUp:1,desc:"シャキシャキ！"},
  corn:       {emoji:"🌽",label:"とうもろこし",moodUp:1,desc:"甘くておいしい！"},
  strawberry: {emoji:"🍓",label:"いちご",      moodUp:3,desc:"大好物！やった！"},
  cucumber:   {emoji:"🥒",label:"きゅうり",    moodUp:2,desc:"シャキシャキ〜！"},
};

const MOODS=[
  {min:0,  max:19, emoji:"😴",label:"お腹すいた...",  bg:"#f0f0ff",border:"#c0c0f0",bar:"#a0a0e0"},
  {min:20, max:39, emoji:"😐",label:"普通かな",        bg:"#fff8f0",border:"#f0d8b0",bar:"#e0b060"},
  {min:40, max:59, emoji:"🙂",label:"うれしい！",      bg:"#f0fff4",border:"#90d8a0",bar:"#50c070"},
  {min:60, max:79, emoji:"😊",label:"とっても幸せ！",  bg:"#f0f8ff",border:"#80b0e0",bar:"#4090d0"},
  {min:80, max:100,emoji:"🥰",label:"最高すぎる！！",  bg:"#fff8e0",border:"#f0c030",bar:"#f0a000"},
];

const load=()=>{try{const r=localStorage.getItem("hq_v4");return r?JSON.parse(r):null;}catch{return null;}};
const save=d=>{try{localStorage.setItem("hq_v4",JSON.stringify(d));}catch{}};
const today=()=>new Date().toISOString().slice(0,10);
const dqId=k=>BASE_QUESTS[k.split("-").reduce((a,b)=>a+parseInt(b),0)%BASE_QUESTS.length].id;
const getLevel=xp=>{let r=RANKS[0];for(const x of RANKS){if(xp>=x.minXP)r=x;}return r;};
const getNextRank=xp=>{for(const r of RANKS){if(xp<r.minXP)return r;}return null;};
const ticketsEarned=lv=>Math.floor(lv/20);
const getMood=full=>{for(const m of MOODS){if(full>=m.min&&full<=m.max)return m;}return MOODS[0];};

let state=(()=>{
  const s=load();
  if(s){if(!s.foodInventory)s.foodInventory={};if(!s.fullness)s.fullness=30;if(!s.charName)s.charName="推し";return s;}
  return{totalXP:0,loginDays:[],questLog:{},diaryEntries:{},repeatCounts:{},tickets:[],charName:"推し",charPhoto:null,foodInventory:{},fullness:30,totalFed:0};
})();

let todayDone=state.questLog[today()]||{};
let todayRC=(state.repeatCounts||{})[today()]||{};
let activeTab="quests";
let confirmTicketId=null;

(()=>{const t=today();if(!state.loginDays.includes(t)){state.loginDays.push(t);save(state);}})();
(()=>{
  const t=today(),last=state.lastLoginDate;
  if(last&&last!==t){const days=Math.min(3,Math.round((new Date(t)-new Date(last))/(86400000)));state.fullness=Math.max(0,state.fullness-days*15);}
  state.lastLoginDate=t;save(state);
})();

// ── ゲームロジック ──
function earnXP(questId,baseXP){
  const t=today(),dq=dqId(t),lc=state.loginDays.length;
  const gm=(lc>0&&lc%10===0)?2:1;
  const gained=Math.round(baseXP*(questId===dq?2:1)*gm);
  const prev=state.totalXP,next=prev+gained;
  const pLv=getLevel(prev).level,nLv=getLevel(next).level;
  const pTix=ticketsEarned(pLv),nTix=ticketsEarned(nLv);
  let gotTicket=false;
  if(nTix>pTix){for(let i=0;i<nTix-pTix;i++)state.tickets.push({id:Date.now()+i,earnedAt:t,earnedAtLevel:nLv,used:false,usedAt:null});gotTicket=true;}
  state.totalXP=next;state.questLog[t]=todayDone;state.repeatCounts[t]=todayRC;save(state);
  showFloatingXP(gained);
  if(nLv>pLv)showLevelUp(getLevel(next),gotTicket);else render();
}

function completeQuest(questId){
  const q=BASE_QUESTS.find(x=>x.id===questId);if(!q)return;
  if(q.food){state.foodInventory[q.food]=(state.foodInventory[q.food]||0)+1;}
  if(q.hasDiary){showDiaryModal(q);return;}
  if(q.repeatable){todayRC[questId]=(todayRC[questId]||0)+1;state.questLog[today()]=todayDone;state.repeatCounts[today()]=todayRC;save(state);earnXP(questId,q.baseXP);return;}
  todayDone[questId]=true;state.questLog[today()]=todayDone;save(state);earnXP(questId,q.baseXP);
}

function feedFood(foodId){
  const food=FOODS[foodId];if(!food)return;
  const cnt=state.foodInventory[foodId]||0;if(cnt<=0)return;
  state.foodInventory[foodId]=cnt-1;
  if(state.foodInventory[foodId]===0)delete state.foodInventory[foodId];
  const prevIdx=MOODS.indexOf(getMood(state.fullness));
  state.fullness=Math.min(100,state.fullness+food.moodUp*8);
  const newIdx=MOODS.indexOf(getMood(state.fullness));
  state.totalFed=(state.totalFed||0)+1;save(state);
  showFeedEffect(food,newIdx>prevIdx);
}

function useTicket(id){confirmTicketId=id;render();}
function confirmUse(){
  const t=state.tickets.find(x=>x.id===confirmTicketId);
  if(t){t.used=true;t.usedAt=today();save(state);}
  confirmTicketId=null;render();
}

// ── エフェクト ──
function showFloatingXP(value){
  const el=document.createElement('div');el.className='floating-xp';
  el.textContent=`+${value} XP 🌟`;document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);setTimeout(render,300);
}

function showFeedEffect(food,moodUp){
  const charEl=document.getElementById('char-photo-wrap');
  if(charEl){
    const rect=charEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const fp=document.createElement('div');
    fp.style.cssText=`position:fixed;z-index:8000;font-size:44px;pointer-events:none;left:50%;top:58%;transform:translate(-50%,-50%);animation:foodPop .35s ease-out forwards;`;
    fp.textContent=food.emoji;document.body.appendChild(fp);
    setTimeout(()=>{
      const sr=fp.getBoundingClientRect();
      const tx=cx-(sr.left+22),ty=cy-(sr.top+22);
      fp.style.cssText=`position:fixed;z-index:8000;font-size:44px;pointer-events:none;left:50%;top:58%;transform:translate(-50%,-50%);--tx:${tx}px;--ty:${ty}px;animation:foodFly .55s ease-in forwards;`;
      setTimeout(()=>fp.remove(),650);
    },380);
  }
  setTimeout(()=>{
    for(let i=0;i<(moodUp?6:3);i++){
      const h=document.createElement('div');
      h.style.cssText=`position:fixed;z-index:8001;pointer-events:none;font-size:${18+Math.random()*14}px;left:${30+Math.random()*40}%;top:${18+Math.random()*22}%;animation:heartPop ${0.7+Math.random()*0.5}s ease-out ${Math.random()*0.3}s forwards;`;
      h.textContent=moodUp?'💖':'💗';document.body.appendChild(h);
      setTimeout(()=>h.remove(),1400);
    }
    showFoodSpeech(food);render();
  },650);
}

let speechTimer=null;
function showFoodSpeech(food){
  const ex=document.getElementById('food-speech');if(ex)ex.remove();
  if(speechTimer)clearTimeout(speechTimer);
  const sp=document.createElement('div');sp.id='food-speech';
  sp.style.cssText=`position:fixed;z-index:7000;pointer-events:none;top:20%;left:50%;transform:translateX(-50%);
    background:#fff;border:2px solid #ffc060;border-radius:24px;
    padding:10px 20px;font-size:14px;color:#e07020;font-weight:700;
    white-space:nowrap;box-shadow:0 4px 20px #ffa04044;animation:popIn .3s ease;`;
  sp.textContent=`${food.emoji} ${food.desc}`;
  document.body.appendChild(sp);speechTimer=setTimeout(()=>sp.remove(),2500);
}

function showLevelUp(rank,gotTicket){
  const bg=document.createElement('div');
  bg.style.cssText='position:fixed;inset:0;z-index:10000;background:#ffffff88;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;';
  const tHTML=gotTicket?`<div style="margin-top:14px;padding:12px 20px;background:linear-gradient(135deg,#f0fff4,#e0f8ec);border:2px solid #60d090;border-radius:16px;"><div style="font-size:28px;">🎁</div><div style="color:#20a060;font-size:14px;font-weight:700;margin-top:4px;">1,000円チケット獲得！</div></div>`:'';
  bg.innerHTML=`<div style="text-align:center;padding:36px 44px;background:#fff;border:3px solid #ffc060;border-radius:28px;box-shadow:0 8px 40px #ffa04055;max-width:300px;width:100%;animation:popIn .4s ease;">
    <div style="font-size:60px;animation:moodBounce .8s ease-out;">${rank.icon}</div>
    <div style="color:#ff8020;font-size:12px;letter-spacing:4px;margin-top:10px;font-family:'Nunito',sans-serif;font-weight:900;">LEVEL UP!</div>
    <div style="color:#3a2a4a;font-size:30px;font-weight:900;margin-top:4px;font-family:'Nunito',sans-serif;">Lv.${rank.level}</div>
    <div style="color:#2090a0;font-size:17px;margin-top:4px;font-weight:700;">「${rank.title}」</div>
    ${tHTML}
    <div style="color:#90a890;font-size:11px;margin-top:14px;">タップで閉じる</div>
  </div>`;
  bg.onclick=()=>{bg.remove();render();};document.body.appendChild(bg);
  for(let i=0;i<16;i++){
    const sp=document.createElement('div');
    sp.style.cssText=`position:fixed;pointer-events:none;z-index:10001;font-size:${14+Math.random()*20}px;top:${10+Math.random()*80}%;left:${5+Math.random()*90}%;animation:sparkle ${0.6+Math.random()*0.9}s ease-out ${Math.random()*0.7}s forwards;`;
    sp.textContent=['✨','⭐','🌟','💫','🎉','🌸'][Math.floor(Math.random()*6)];
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),2200);
  }
  setTimeout(()=>{bg.remove();render();},5000);
}

function showDiaryModal(quest){
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div style="background:#fff;border:2px solid #ffc060;border-radius:24px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px #ffa04033;">
    <div style="color:#e07020;font-weight:900;font-size:16px;margin-bottom:6px;font-family:'Nunito',sans-serif;">📖 今日の幸せ日記</div>
    <div style="color:#80a890;font-size:12px;margin-bottom:12px;">今日見つけた幸せを1つ書きましょう 🌸</div>
    <textarea id="di" placeholder="例：朝の空気が気持ちよかった" style="width:100%;height:90px;background:#f8fff8;color:#3a2a4a;border:1.5px solid #a0d8b0;border-radius:12px;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;resize:none;outline:none;"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;">
      <button id="dc" style="flex:1;padding:10px;background:#f0f8f0;border:1.5px solid #c0d8c0;color:#80a890;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;">キャンセル</button>
      <button id="ds" style="flex:2;padding:10px;background:linear-gradient(135deg,#ff9030,#e06010);border:none;color:#fff;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:0 4px 12px #e07020aa;">記録して XP 獲得 ✨</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  const inp=document.getElementById('di');setTimeout(()=>inp&&inp.focus(),80);
  document.getElementById('dc').onclick=()=>bg.remove();
  document.getElementById('ds').onclick=()=>{
    const txt=(inp?inp.value:'').trim();if(!txt)return;
    if(!state.diaryEntries)state.diaryEntries={};
    const t=today();if(!state.diaryEntries[t])state.diaryEntries[t]=[];
    state.diaryEntries[t].unshift(txt);todayDone.diary=true;state.questLog[t]=todayDone;save(state);bg.remove();earnXP(quest.id,quest.baseXP);
  };
}

function showSetupModal(){
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='setup-modal';
  bg.innerHTML=`<div style="background:#fff;border:2px solid #ffc060;border-radius:24px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px #ffa04033;">
    <div style="color:#e07020;font-weight:900;font-size:16px;margin-bottom:14px;font-family:'Nunito',sans-serif;">🎮 推しキャラ設定</div>
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:16px;">
      <div id="prev-wrap" onclick="document.getElementById('ph-inp').click()" style="width:100px;height:100px;border-radius:50%;overflow:hidden;border:3px solid #40c880;background:#f0fff8;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:8px;box-shadow:0 4px 16px #40c88044;">
        ${state.charPhoto?`<img src="${state.charPhoto}" style="width:100%;height:100%;object-fit:cover;">`:`<div style="text-align:center;color:#30b870;font-size:10px;"><div style="font-size:30px;">📷</div>写真を選ぶ</div>`}
      </div>
      <input type="file" id="ph-inp" accept="image/*" style="display:none;" onchange="previewPhoto(this)">
      <div style="color:#90a890;font-size:10px;">タップして写真を選択</div>
    </div>
    <div style="margin-bottom:16px;">

window._tmpPhoto=null;
function previewPhoto(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{window._tmpPhoto=e.target.result;const w=document.getElementById('prev-wrap');if(w)w.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;};
  r.readAsDataURL(f);
}
function saveSetup(){
  const n=document.getElementById('nm-inp');state.charName=(n?n.value.trim():'')||'推し';
  if(window._tmpPhoto){state.charPhoto=window._tmpPhoto;window._tmpPhoto=null;}
  save(state);document.getElementById('setup-modal')?.remove();render();
}

  const tabBar=tabs.map(([id,l])=>`<button class="tab-btn ${activeTab===id?'active':''}" onclick="switchTab('${id}')">${l}</button>`).join('');

        ${unusedTix>0?`<div onclick="switchTab('wallet')" style="background:#f0fff8;border:1.5px solid #80e0a0;border-radius:16px;padding:3px 10px;cursor:pointer;display:flex;align-items:center;gap:3px;animation:ticketGl 2s infinite;box-shadow:0 2px 8px #80e0a044;"><span style="font-size:13px;">🎁</span><span style="color:#20a060;font-size:11px;font-weight:700;">${unusedTix}</span></div>`:''}
        ${invTotal>0?`<div onclick="switchTab('feed')" style="background:#fff8f0;border:1.5px solid #ffc0a0;border-radius:16px;padding:3px 10px;cursor:pointer;display:flex;align-items:center;gap:3px;box-shadow:0 2px 8px #ffc0a044;"><span style="font-size:13px;">🍽️</span><span style="color:#e07030;font-size:11px;font-weight:700;">${invTotal}</span></div>`:''}
        <div style="color:#c0a8c0;font-size:10px;"><span style="color:#60c080;font-weight:700;">${lc}</span>日</div>
      </div>
    </div>

    <!-- キャラ＋ステータス -->
    <div class="card" style="padding:14px 16px;display:flex;gap:12px;align-items:center;">
      ${charArea}
      <div style="flex:1;min-width:0;padding:2px 0;">
        <div style="color:#e07020;font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;">「${cur.title}」</div>
        <div style="color:#70a890;font-size:10px;margin-top:2px;">Lv.${curLevel} • <span style="color:#e07020;font-weight:700;">${state.totalXP.toLocaleString()} XP</span>${gm>1?`<span style="color:#e08030;margin-left:4px;font-weight:700;">🔥×${gm}</span>`:''}</div>
        <div style="margin-top:8px;">${xpBar}</div>
        <div style="margin-top:6px;">${fullBar}</div>
      </div>
    </div>
    <div style="height:14px;"></div>
  </div>

  <div class="tab-bar">${tabBar}</div>
  <div style="position:relative;z-index:1;">${content}</div>
  ${confirmModal}
  `;
}

function switchTab(id){activeTab=id;render();}
function cancelConfirm(){confirmTicketId=null;render();}

render();
</script>
</body>
</html>
