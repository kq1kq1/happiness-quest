<script>
// ══════════════════════════
//  定数

// ── XPシステム（レベル1〜999） ──
function xpToNext(L){
  if(L>=999)return Infinity;
  if(L>=100)return 960;
  if(L>=70)return Math.round(480+(L-70)*16);
  if(L>=30)return Math.round(240+(L-30)*6);
  if(L>=10)return Math.round(210+(L-10)*1.5);
  return [25,35,50,70,90,115,140,170,200][L-1]||25;
}
// LEVEL_XP[L] = レベルLに到達するための累計XP
const LEVEL_XP=[0,0];
for(let i=2;i<=999;i++)LEVEL_XP[i]=LEVEL_XP[i-1]+xpToNext(i-1);

// 称号テーブル（10レベルごと、Lv1〜99）
const TITLE_DATA=[
  {icon:"🌱",title:"迷える旅人"},
  {icon:"🌿",title:"希望の芽生え"},
  {icon:"🌸",title:"朝露の探求者"},
  {icon:"☀️",title:"光を集める者"},
  {icon:"🌻",title:"心の庭師"},
  {icon:"⚔️",title:"穏やかな戦士"},
  {icon:"⚗️",title:"幸せの錬金術師"},
  {icon:"🔮",title:"内なる光の守護者"},
  {icon:"🧙",title:"叡智の賢者"},
  {icon:"✨",title:"至福の覚醒者"},
];
const DAN_ICONS=["🥋","🥊","🏆","👑","💎","⭐","🌟","🔥","🌈","✨"];

function toDanNumber(n){
  if(n===1)return"初";
  const ones=["","一","二","三","四","五","六","七","八","九"];
  if(n<10)return ones[n];
  const t=Math.floor(n/10),o=n%10;
  return(t===1?"十":ones[t]+"十")+ones[o];
}
function getTitleData(level){
  if(level<100)return TITLE_DATA[Math.min(Math.floor(level/10),9)];
  const dan=Math.floor((level-100)/10)+1;
  return{icon:DAN_ICONS[(dan-1)%DAN_ICONS.length],title:`${toDanNumber(dan)}段`};
}
function getLevelNum(xp){
  let lo=1,hi=999;
  while(lo<hi){const mid=Math.floor((lo+hi+1)/2);if(LEVEL_XP[mid]<=xp)lo=mid;else hi=mid-1;}
  return lo;
}
const charCount=lv=>Math.min(1+Math.floor(lv/100),10);

const BASE_QUESTS=[

  {id:"soy_egg",   label:"大豆 or 卵を食べる", desc:"良質なタンパク源",    icon:"🥚",baseXP:30,food:"egg",repeatable:true,maxCount:3},
  {id:"sleep",     label:"12時までに寝る",     desc:"早寝は最高の魔法",    icon:"🌙",baseXP:80,food:"banana"},
  {id:"walking",   label:"ウォーキング",       desc:"10分 = 1回分のXP",   icon:"🚶",baseXP:25,food:"apple",repeatable:true,unit:"10分"},
  {id:"sunlight",  label:"日光を浴びる",       desc:"10分 = 1回分のXP",   icon:"🌞",baseXP:25,food:"corn",repeatable:true,unit:"10分"},
  {id:"diary",     label:"幸せ日記を書く",     desc:"今日の幸せを1つ記録", icon:"📖",baseXP:40,food:"strawberry",hasDiary:true,repeatable:true},
];

const FOODS={
  matcha:     {emoji:"🍵",label:"抹茶",            moodUp:2,desc:"心が落ち着くよ〜"},
  milk:       {emoji:"🥛",label:"ミルク",          moodUp:1,desc:"栄養満点だよ！"},

  apple:      {emoji:"🍎",label:"りんご",          moodUp:1,desc:"シャキシャキ！"},
  corn:       {emoji:"🌽",label:"とうもろこし",    moodUp:1,desc:"甘くておいしい！"},
  strawberry: {emoji:"🍓",label:"いちご",          moodUp:3,desc:"大好物！やった！"},
  cucumber:   {emoji:"🥒",label:"きゅうり",        moodUp:2,desc:"シャキシャキ〜！"},
  // 週次チャレンジ特別アイテム
  gift_box:   {emoji:"🎁",label:"ギフトボックス",  moodUp:8,desc:"週チャレ達成の証！",special:true},
  rainbow:    {emoji:"🌈",label:"レインボーキャンディ",moodUp:8,desc:"夢みたいにうれしい！",special:true},
  diamond:    {emoji:"💎",label:"ダイヤモンド",    moodUp:8,desc:"最高の宝物だよ！",special:true},
  golden_star:{emoji:"⭐",label:"ゴールデンスター",moodUp:8,desc:"輝いてる！！",special:true},
};

const MOODS=[
  {min:0,  max:19, emoji:"😴",label:"お腹すいた...",  bg:"#f0f0ff",border:"#c0c0f0",bar:"#a0a0e0"},
  {min:20, max:39, emoji:"😐",label:"普通かな",        bg:"#fff8f0",border:"#f0d8b0",bar:"#e0b060"},
  {min:40, max:59, emoji:"🙂",label:"うれしい！",      bg:"#f0fff4",border:"#90d8a0",bar:"#50c070"},

  {min:80, max:100,emoji:"🥰",label:"最高すぎる！！",  bg:"#fff8e0",border:"#f0c030",bar:"#f0a000"},
];

// ── Supabase ──
const SUPA_URL='https://agcfyavanwoufizjyjgh.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFnY2Z5YXZhbndvdWZpemp5amdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODY1NzksImV4cCI6MjA5MDg2MjU3OX0.qe5gWtpktftVlToWI6qhimHz7xZiubcDZDkLESsFOQM';
const UID_KEY='hq_uid';
let _sb=null;
const getSB=()=>{if(!_sb&&window.supabase)_sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);return _sb;};
function getUID(){let id=localStorage.getItem(UID_KEY);if(!id){id=crypto.randomUUID?crypto.randomUUID():([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));localStorage.setItem(UID_KEY,id);}return id;}
async function cloudSave(d){try{const sb=getSB();if(!sb)return;await sb.from('user_data').upsert({id:getUID(),data:d,updated_at:new Date().toISOString()});}catch(e){}}
async function cloudLoad(uid){try{const sb=getSB();if(!sb)return null;const{data,error}=await sb.from('user_data').select('data').eq('id',uid).single();if(!error&&data)return data.data;}catch(e){}return null;}

const load=()=>{try{const r=localStorage.getItem("hq_v5");return r?JSON.parse(r):null;}catch{return null;}};
const save=d=>{try{localStorage.setItem("hq_v5",JSON.stringify(d));}catch{}cloudSave(d);};
const today=()=>new Date().toISOString().slice(0,10);
const dqId=k=>BASE_QUESTS[k.split("-").reduce((a,b)=>a+parseInt(b),0)%BASE_QUESTS.length].id;
const getLevel=xp=>{const level=getLevelNum(xp);const td=getTitleData(level);return{level,title:td.title,icon:td.icon,minXP:LEVEL_XP[level]};};
const getNextRank=xp=>{const level=getLevelNum(xp);if(level>=999)return null;const nl=level+1;const td=getTitleData(nl);return{level:nl,title:td.title,icon:td.icon,minXP:LEVEL_XP[nl]};};
const ticketsEarned=lv=>Math.floor(lv/20);
const getMood=full=>{for(const m of MOODS){if(full>=m.min&&full<=m.max)return m;}return MOODS[0];};

// ── ストリーク・ガチャ ──
function getNextStreakMilestone(n){
  for(const m of[1,2,3,5,7,10,20,30,50,100])if(m>n)return m;
  return Math.ceil((n+1)/50)*50;
}
// 全体XPブースト（チケット使用後）
function getBoostMultiplier(){
  if(!state.xpBoost)return 1;
  if(Date.now()>state.xpBoost.expiresAt){delete state.xpBoost;save(state);return 1;}
  return state.xpBoost.multiplier;
}
// クエスト個別ブースト（早期ストリーク報酬）
function getQuestBoostMult(questId){
  if(!state.questBoost)return 1;
  if(Date.now()>state.questBoost.expiresAt){delete state.questBoost;save(state);return 1;}
  return state.questBoost.questId===questId?state.questBoost.multiplier:1;
}
// ブーストチケット追加
function addBoostTicket(reason){
  if(!state.boostTickets)state.boostTickets=[];
  state.boostTickets.push({id:Date.now(),earnedAt:today(),reason,used:false,usedAt:null});
  save(state);
  showBoostTicketGained(reason);
}
function showBoostTicketGained(reason){
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div style="text-align:center;padding:32px 28px;background:#fff;border:3px solid #b060ff;border-radius:28px;box-shadow:0 8px 40px #a04off55;max-width:290px;width:100%;animation:popIn .4s ease;">
    <div style="font-size:50px;animation:moodBounce .8s ease-out;">🎟️</div>
    <div style="color:#8030d0;font-size:11px;letter-spacing:3px;font-weight:700;margin-top:8px;">BOOST TICKET</div>
    <div style="color:#3a2a4a;font-size:15px;font-weight:900;margin-top:4px;">XPブーストチケット獲得！</div>
    <div style="color:#90a890;font-size:11px;margin-top:5px;">${reason}</div>
    <div style="color:#80a0c0;font-size:11px;margin-top:8px;">チケットタブからガチャを引こう！</div>
    <button onclick="this.closest('.modal-bg').remove();render();" style="margin-top:14px;width:100%;padding:10px;background:linear-gradient(135deg,#a040e0,#8020c0);border:none;color:#fff;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;">OK ✨</button>
  </div>`;
  document.body.appendChild(bg);
}
function useBoostTicket(ticketId){
  const tk=(state.boostTickets||[]).find(t=>t.id===ticketId);
  if(!tk||tk.used)return;
  tk.used=true;tk.usedAt=today();save(state);
  showBoostGacha();
}

// ── 週次ブーストチケット（型・倍率を事前抽選） ──
function awardWeeklyBoostTicket(questOnly=false){
  const isQuestType=questOnly||Math.random()<0.6;
  const r=Math.random();
  const mult=r<.4?2:r<.7?3:r<.9?4:5;
  const questId=isQuestType?BASE_QUESTS[Math.floor(Math.random()*BASE_QUESTS.length)].id:null;
  const ticket={id:Date.now(),earnedAt:today(),type:isQuestType?'quest':'overall',multiplier:mult,questId,used:false,usedAt:null};
  if(!state.weeklyBoostTickets)state.weeklyBoostTickets=[];
  state.weeklyBoostTickets.push(ticket);save(state);
  setTimeout(()=>showWeeklyTicketGained(ticket),0);
}
function showWeeklyTicketGained(ticket){
  const q=ticket.questId?BASE_QUESTS.find(x=>x.id===ticket.questId):null;
  const mc={2:'#60b0f0',3:'#50c050',4:'#e08030',5:'#c040c0'};
  const isQ=ticket.type==='quest';
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div style="text-align:center;padding:32px 28px;background:#fff;border:3px solid ${isQ?'#60b0ff':'#b060ff'};border-radius:28px;box-shadow:0 8px 40px ${isQ?'#4090ff':'#9040ff'}33;max-width:300px;width:100%;animation:popIn .4s ease;">
    <div style="font-size:50px;animation:moodBounce .8s ease-out;">${isQ?'🎯':'🚀'}</div>
    <div style="color:${isQ?'#2060c0':'#8030d0'};font-size:11px;letter-spacing:3px;font-weight:700;margin-top:8px;">WEEKLY COMPLETE!</div>
    <div style="color:#3a2a4a;font-size:15px;font-weight:900;margin-top:4px;">${isQ?'クエストブーストチケット':'全体XPブーストチケット'}獲得！</div>
    <div style="margin-top:14px;padding:14px;background:${isQ?'linear-gradient(135deg,#f0f4ff,#e4ecff)':'linear-gradient(135deg,#f8f0ff,#f0e8ff)'};border:2px solid ${isQ?'#80b0ff':'#c080ff'};border-radius:14px;">
      <div style="font-size:30px;">${isQ?(q?q.icon:'❓'):'✨'}</div>
      <div style="font-size:12px;font-weight:700;color:${isQ?'#2060c0':'#8030d0'};margin-top:3px;">${isQ?(q?q.label:'?'):'全クエスト対象'}</div>
      <div style="font-size:38px;font-weight:900;color:${mc[ticket.multiplier]};font-family:'Nunito';line-height:1.2;">×${ticket.multiplier}</div>
      <div style="color:#90a090;font-size:10px;">24時間ブースト</div>
    </div>
    <div style="color:#80a0c0;font-size:11px;margin-top:8px;">チケットタブから使えるよ！</div>
    <button onclick="this.closest('.modal-bg').remove();render();" style="margin-top:12px;width:100%;padding:10px;background:linear-gradient(135deg,${isQ?'#3090ff,#1060d0':'#c060ff,#8020d0'});border:none;color:#fff;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;">やった！ ✨</button>
  </div>`;
  document.body.appendChild(bg);
  if(ticket.multiplier>=4){for(let i=0;i<12;i++){const sp=document.createElement('div');sp.style.cssText=`position:fixed;pointer-events:none;z-index:10002;font-size:${14+Math.random()*18}px;top:${10+Math.random()*80}%;left:${5+Math.random()*90}%;animation:sparkle ${.6+Math.random()*.9}s ease-out ${Math.random()*.5}s forwards;`;sp.textContent=['✨','⭐','🌟','💫'][Math.floor(Math.random()*4)];document.body.appendChild(sp);setTimeout(()=>sp.remove(),2000);}}
}
function useWeeklyBoostTicket(ticketId){
  const tk=(state.weeklyBoostTickets||[]).find(t=>t.id===ticketId);
  if(!tk||tk.used)return;
  tk.used=true;tk.usedAt=today();
  const exp=Date.now()+24*60*60*1000;
  if(tk.type==='quest'){state.questBoost={questId:tk.questId,multiplier:tk.multiplier,expiresAt:exp};}
  else{state.xpBoost={multiplier:tk.multiplier,expiresAt:exp};}
  save(state);render();
  const q=tk.questId?BASE_QUESTS.find(x=>x.id===tk.questId):null;
  const mc={2:'#60b0f0',3:'#50c050',4:'#e08030',5:'#c040c0'};
  const isQ=tk.type==='quest';
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div style="text-align:center;padding:30px 28px;background:#fff;border:3px solid ${mc[tk.multiplier]};border-radius:28px;box-shadow:0 8px 40px ${mc[tk.multiplier]}44;max-width:290px;width:100%;animation:popIn .4s ease;">

    <div style="color:#3a2a4a;font-size:16px;font-weight:900;margin-top:4px;">${isQ?(q?q.label+'のXP':'?のXP'):'全クエストのXP'}が<br><span style="font-size:36px;color:${mc[tk.multiplier]};font-family:'Nunito';">×${tk.multiplier}</span></div>
    <div style="color:#90a890;font-size:11px;margin-top:8px;">24時間のブースト発動！ ✨</div>
    <button onclick="this.closest('.modal-bg').remove();" style="margin-top:14px;width:100%;padding:10px;background:linear-gradient(135deg,#ff9030,#e06010);border:none;color:#fff;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;">OK ✨</button>
  </div>`;
  document.body.appendChild(bg);
}

// ── 週次チャレンジ ──
const WEEKLY_REWARDS=['gift_box','rainbow','diamond','golden_star'];
function getWeekId(){
  const d=new Date(),start=new Date(d.getFullYear(),0,1);
  return`${d.getFullYear()}-W${Math.floor((d-start)/(7*86400000))}`;
}
function getOrInitWeeklyQuest(){
  const wid=getWeekId();
  if(state.weeklyQuest&&state.weeklyQuest.weekId===wid)return state.weeklyQuest;
  const picks=[...BASE_QUESTS].sort(()=>Math.random()-.5).slice(0,4);
  state.weeklyQuest={weekId:wid,tasks:picks.map((q,i)=>({questId:q.id,goal:5,count:0,claimed:false,reward:WEEKLY_REWARDS[i]}))};
  save(state);return state.weeklyQuest;

// ── ゲームロジック ──
function earnXP(questId,baseXP){
  const t=today(),dq=dqId(t),lc=state.loginDays.length;
  const gm=(lc>0&&lc%10===0)?2:1;
  const boost=getBoostMultiplier();
  const questBoost=getQuestBoostMult(questId);
  const gained=Math.round(baseXP*(questId===dq?2:1)*gm*boost*questBoost);
  const prev=state.totalXP,next=prev+gained;
  const pLv=getLevel(prev).level;
  // 1クエストで上がるレベルは+1まで（余剰XPは次レベルの入口でキャップ）
  const capXP=(pLv+2<=999)?LEVEL_XP[pLv+2]-5:Infinity;
  const cappedNext=Math.min(next,capXP);
  const nLv=getLevel(cappedNext).level;
  const pTix=ticketsEarned(pLv),nTix=ticketsEarned(nLv);
  const pChars=charCount(pLv),nChars=charCount(nLv);
  let gotTicket=false;
  if(nTix>pTix){for(let i=0;i<nTix-pTix;i++)state.tickets.push({id:Date.now()+i,earnedAt:t,earnedAtLevel:nLv,used:false,usedAt:null});gotTicket=true;}
  if(nChars>pChars){while(state.chars.length<nChars)state.chars.push({name:`推し${state.chars.length+1}`,photo:null});}
  state.totalXP=cappedNext;state.questLog[t]=todayDone;state.repeatCounts[t]=todayRC;
  updateWeeklyProgress(questId);
  save(state);
  showFloatingXP(gained,boost>1||questBoost>1);
  if(nLv>pLv)showLevelUp(getLevel(cappedNext),gotTicket,nChars>pChars);else render();
}

function updateWeeklyProgress(questId){
  const wq=getOrInitWeeklyQuest();
  const task=wq.tasks.find(t=>t.questId===questId);
  if(!task||task.claimed)return;
  task.count=Math.min(task.count+1,task.goal);
  if(task.count>=task.goal){
    task.claimed=true;
    state.foodInventory[task.reward]=(state.foodInventory[task.reward]||0)+1;
    setTimeout(()=>showWeeklyReward(task.reward),1800);
    if(!wq.completionTicketGiven&&wq.tasks.every(t=>t.claimed)){
      wq.completionTicketGiven=true;
      setTimeout(()=>awardWeeklyBoostTicket(true),2800);
    }
  }
}
function switchChar(idx){state.activeCharIdx=idx;save(state);render();}

function completeQuest(questId){
  const q=BASE_QUESTS.find(x=>x.id===questId);if(!q)return;
  if(q.repeatable&&q.maxCount&&(todayRC[questId]||0)>=q.maxCount)return;
  if(q.food){state.foodInventory[q.food]=(state.foodInventory[q.food]||0)+1;}
  if(q.hasDiary){showDiaryModal(q);return;}
  if(q.repeatable){todayRC[questId]=(todayRC[questId]||0)+1;state.questLog[today()]=todayDone;state.repeatCounts[today()]=todayRC;save(state);earnXP(questId,q.baseXP);return;}
  todayDone[questId]=true;state.questLog[today()]=todayDone;save(state);earnXP(questId,q.baseXP);
}

function feedFood(foodId){
  const food=FOODS[foodId];if(!food)return;
  const cnt=state.foodInventory[foodId]||0;if(cnt<=0)return;
  state.foodInventory[foodId]=cnt-1;
  if(state.foodInventory[foodId]===0)delete state.foodInventory[foodId];
  const char=state.chars[state.activeCharIdx||0];
  const prevIdx=MOODS.indexOf(getMood(char.fullness||0));
  char.fullness=Math.min(100,(char.fullness||0)+food.moodUp*5);
  const newIdx=MOODS.indexOf(getMood(char.fullness));
  state.totalFed=(state.totalFed||0)+1;save(state);
  showFeedEffect(food,newIdx>prevIdx);
}

window._tmpPhoto=null;
function previewPhoto(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=400;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      const compressed=c.toDataURL('image/jpeg',0.85);
      window._tmpPhoto=compressed;
      const w=document.getElementById('prev-wrap');
      if(w)w.innerHTML=`<img src="${compressed}" style="width:100%;height:100%;object-fit:cover;">`;
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}
function saveSetup(charIdx){
  if(charIdx===undefined)charIdx=state.activeCharIdx||0;
  if(!state.chars)state.chars=[{name:"推し",photo:null}];
  while(state.chars.length<=charIdx)state.chars.push({name:`推し${state.chars.length+1}`,photo:null});
  const n=document.getElementById('nm-inp');
  state.chars[charIdx]={name:(n?n.value.trim():'')||`推し${charIdx+1}`,photo:window._tmpPhoto||state.chars[charIdx].photo||null};
  window._tmpPhoto=null;
  state.charName=state.chars[0].name;state.charPhoto=state.chars[0].photo;
  save(state);document.getElementById('setup-modal')?.remove();render();
}

        <div style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#e07020;letter-spacing:1px;">🌟 HAPPINESS QUEST</div>
        <div style="font-size:11px;color:#70a890;margin-top:2px;">${dateStr}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        ${unusedTix>0?`<div onclick="switchTab('wallet')" style="background:#f0fff8;border:1.5px solid #80e0a0;border-radius:16px;padding:3px 10px;cursor:pointer;display:flex;align-items:center;gap:3px;animation:ticketGl 2s infinite;box-shadow:0 2px 8px #80e0a044;"><span style="font-size:13px;">🎁</span><span style="color:#20a060;font-size:11px;font-weight:700;">${unusedTix}</span></div>`:''}
        ${invTotal>0?`<div onclick="switchTab('feed')" style="background:#fff8f0;border:1.5px solid #ffc0a0;border-radius:16px;padding:3px 10px;cursor:pointer;display:flex;align-items:center;gap:3px;box-shadow:0 2px 8px #ffc0a044;"><span style="font-size:13px;">🍽️</span><span style="color:#e07030;font-size:11px;font-weight:700;">${invTotal}</span></div>`:''}
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
          <div style="background:#fff8f0;border:1.5px solid #ffd0a0;border-radius:10px;padding:2px 8px;display:flex;align-items:center;gap:3px;"><span style="font-size:11px;">🔥</span><span style="color:#e07020;font-size:10px;font-weight:700;">${streak}日連続</span></div>
          <div style="color:#c0a8c0;font-size:9px;">通算${lc}日</div>
        </div>
      </div>
    </div>

    <!-- キャラ＋ステータス -->
    <div class="card" style="padding:14px 16px;display:flex;gap:12px;align-items:center;">
      ${charArea}
      <div style="flex:1;min-width:0;padding:2px 0;">
        <div style="color:#e07020;font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;">「${cur.title}」</div>
        <div style="color:#70a890;font-size:10px;margin-top:2px;">Lv.${curLevel} • <span style="color:#e07020;font-weight:700;">${state.totalXP.toLocaleString()} XP</span>${gm>1?`<span style="color:#e08030;margin-left:4px;font-weight:700;">🔥×${gm}</span>`:''}</div>
        <div style="margin-top:8px;">${xpBar}</div>
        <div style="margin-top:6px;">${fullBar}</div>
      </div>
    </div>
    <div style="height:14px;"></div>
  </div>

  <div class="tab-bar">${tabBar}</div>
  <div style="position:relative;z-index:1;">${content}</div>
  ${confirmModal}
  `;
}

function switchTab(id){activeTab=id;render();}
function cancelConfirm(){confirmTicketId=null;render();}

// ── Supabase UI ──
function copyUID(){
  const uid=getUID();
  navigator.clipboard?.writeText(uid).then(()=>{
    const els=document.querySelectorAll('[onclick="copyUID()"] span');
    els.forEach(el=>{el.textContent='コピーしました！✅';setTimeout(()=>{el.textContent='タップでコピー';},2000);});
  }).catch(()=>{});
}

function showIdRestoreModal(){
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='restore-modal';
  bg.innerHTML=`<div style="text-align:center;padding:28px;background:#fff;border:3px solid #4090ff;border-radius:28px;max-width:300px;width:100%;animation:popIn .4s ease;">
    <div style="font-size:36px;">🔑</div>
    <div style="color:#3a2a4a;font-size:16px;font-weight:900;margin-top:8px;">IDで引き継ぐ</div>
    <div style="color:#90a890;font-size:11px;margin-top:4px;">引き継ぎたいIDを入力してください</div>
    <input id="restore-inp" placeholder="xxxxxxxx-xxxx-xxxx-xxxx" style="width:100%;margin-top:12px;padding:10px 12px;border:1.5px solid #a0d0f0;border-radius:12px;font-size:11px;font-family:monospace;outline:none;background:#f8f8ff;color:#3060a0;">
    <div id="restore-err" style="color:#e04040;font-size:11px;margin-top:6px;display:none;">IDが見つかりませんでした</div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">
      <button onclick="doRestore()" style="width:100%;padding:12px;background:linear-gradient(135deg,#4090ff,#2060d0);border:none;color:#fff;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;">復元する</button>
      <button onclick="document.getElementById('restore-modal').remove();" style="width:100%;padding:10px;background:#f0f0f0;border:none;color:#909090;border-radius:12px;font-size:12px;cursor:pointer;">キャンセル</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
}

async function doRestore(){
  const inp=document.getElementById('restore-inp');
  const id=(inp?inp.value:'').trim();if(!id)return;
  const btn=document.querySelector('#restore-modal button');
  if(btn){btn.textContent='復元中...';btn.disabled=true;}
  const cloudData=await cloudLoad(id);
  if(cloudData){
    localStorage.setItem(UID_KEY,id);
    localStorage.setItem('hq_v5',JSON.stringify(cloudData));
    location.reload();
  }else{
    const err=document.getElementById('restore-err');
    if(err)err.style.display='block';
    if(btn){btn.textContent='復元する';btn.disabled=false;}
  }
}

function showWelcomeModal(){
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='welcome-modal';
  bg.innerHTML=`<div style="text-align:center;padding:36px 28px;background:#fff;border:3px solid #50c080;border-radius:28px;max-width:300px;width:100%;animation:popIn .4s ease;">
    <div style="font-size:52px;">🌟</div>
    <div style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:#e07020;margin-top:8px;">HAPPINESS QUEST</div>
    <div style="color:#70a890;font-size:12px;margin-top:6px;">ようこそ！</div>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;">
      <button onclick="startFresh()" style="width:100%;padding:13px;background:linear-gradient(135deg,#50c080,#30a060);border:none;color:#fff;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;">✨ はじめる</button>
      <button onclick="showWelcomeRestore()" style="width:100%;padding:13px;background:#f0f8ff;border:2px solid #80b0e0;color:#4080c0;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;">🔑 IDで引き継ぐ</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
}

function showWelcomeRestore(){
  const box=document.querySelector('#welcome-modal > div');if(!box)return;
  box.innerHTML=`<div style="font-size:36px;">🔑</div>
    <div style="color:#3a2a4a;font-size:16px;font-weight:900;margin-top:8px;">IDで引き継ぐ</div>
    <div style="color:#90a890;font-size:11px;margin-top:4px;">以前のIDを入力してください</div>
    <input id="restore-inp" placeholder="xxxxxxxx-xxxx-xxxx-xxxx" style="width:100%;margin-top:12px;padding:10px 12px;border:1.5px solid #a0d0f0;border-radius:12px;font-size:11px;font-family:monospace;outline:none;background:#f8f8ff;color:#3060a0;">
    <div id="restore-err" style="color:#e04040;font-size:11px;margin-top:6px;display:none;">IDが見つかりませんでした</div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">
      <button onclick="doRestore()" style="width:100%;padding:12px;background:linear-gradient(135deg,#4090ff,#2060d0);border:none;color:#fff;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;">復元する</button>
      <button onclick="startFresh()" style="width:100%;padding:10px;background:#f0f0f0;border:none;color:#909090;border-radius:12px;font-size:12px;cursor:pointer;">新規ではじめる</button>
    </div>`;
}

function startFresh(){
  getUID();
  document.getElementById('welcome-modal')?.remove();
  cloudSave(state);
  showNewUserIdNotice();
}

function showNewUserIdNotice(){
  const uid=getUID();
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div style="text-align:center;padding:28px;background:#fff;border:3px solid #50c080;border-radius:28px;max-width:300px;width:100%;animation:popIn .4s ease;">
    <div style="font-size:36px;">🔑</div>
    <div style="color:#3a2a4a;font-size:16px;font-weight:900;margin-top:8px;">あなたのID</div>
    <div style="color:#90a890;font-size:11px;margin-top:4px;">このIDを保存しておくと<br>どの端末でもデータを引き継げます</div>
    <div onclick="copyUID()" style="margin:12px 0;padding:12px;background:#f0f8ff;border:1.5px solid #80b0e0;border-radius:12px;font-size:10px;font-family:monospace;color:#4060a0;word-break:break-all;cursor:pointer;">${uid}<br><span style="font-size:9px;color:#90b0d0;">タップでコピー</span></div>
    <div style="color:#e07020;font-size:11px;font-weight:700;">⚠️ スクリーンショットで保存推奨</div>
    <button onclick="this.closest('.modal-bg').remove();render();" style="margin-top:14px;width:100%;padding:11px;background:linear-gradient(135deg,#50c080,#30a060);border:none;color:#fff;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;">OK、保存した！</button>
  </div>`;
  document.body.appendChild(bg);
}

async function boot(){
  const hasLocal=!!localStorage.getItem('hq_v5');
  const storedUid=localStorage.getItem(UID_KEY);

  if(hasLocal){
    if(!storedUid)getUID();
    render();
    cloudSave(state); // バックグラウンドで同期
    return;
  }

  if(storedUid){
    // localStorageが消えたがUIDは残っている → 自動復元
    const overlay=document.createElement('div');overlay.id='boot-overlay';
    overlay.style.cssText='position:fixed;inset:0;z-index:99999;background:#f0fff0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
    overlay.innerHTML='<div style="font-size:48px;animation:moodBounce 1s ease-in-out infinite;">🌟</div><div style="color:#70a890;font-size:14px;font-weight:700;">データを復元中...</div>';
    document.body.appendChild(overlay);
    const cloudData=await cloudLoad(storedUid);
    overlay.remove();
    if(cloudData){
      localStorage.setItem('hq_v5',JSON.stringify(cloudData));
      location.reload();return;
    }
  }

  // 新規 or 復元不可 → ウェルカムモーダル
  showWelcomeModal();
  render();
}

boot();
</script>
</body>
</html>
